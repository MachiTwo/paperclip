# Fly.io app names are globally unique — pick your own
app = "paperclip"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"
  build-target = "production"

[env]
  HOST = "0.0.0.0"
  PORT = "3100"
  NODE_ENV = "production"
  PAPERCLIP_HOME = "/paperclip"
  PAPERCLIP_INSTANCE_ID = "default"
  PAPERCLIP_DEPLOYMENT_MODE = "authenticated"
  PAPERCLIP_DEPLOYMENT_EXPOSURE = "public"
  PAPERCLIP_AUTH_BASE_URL_MODE = "explicit"
  PAPERCLIP_AUTH_PUBLIC_BASE_URL = "https://paperclip.fly.dev"
  SERVE_UI = "true"

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "30s"
  method = "GET"
  path = "/"

[mounts]
  source = "paperclip_data"
  destination = "/paperclip"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"